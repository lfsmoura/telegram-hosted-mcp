{% extends "base.html" %}

{% block title %}Enter Phone Number - Telegram Auth{% endblock %}

{% block content %}
<div class="logo">
    <svg viewBox="0 0 24 24" fill="#667eea">
        <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm4.64 6.8c-.15 1.58-.8 5.42-1.13 7.19-.14.75-.42 1-.68 1.03-.58.05-1.02-.38-1.58-.75-.88-.58-1.38-.94-2.23-1.5-.99-.65-.35-1.01.22-1.59.15-.15 2.71-2.48 2.76-2.69a.2.2 0 00-.05-.18c-.06-.05-.14-.03-.21-.02-.09.02-1.49.95-4.22 2.79-.4.27-.76.41-1.08.4-.36-.01-1.04-.2-1.55-.37-.63-.2-1.12-.31-1.08-.66.02-.18.27-.36.74-.55 2.92-1.27 4.86-2.11 5.83-2.51 2.78-1.16 3.35-1.36 3.73-1.36.08 0 .27.02.39.12.1.08.13.19.14.27-.01.06.01.24 0 .38z"/>
    </svg>
</div>

<h1>Connect Telegram</h1>
<p class="subtitle">Enter your phone number to connect your Telegram account to Claude.</p>

<div class="steps">
    <div class="step active"></div>
    <div class="step"></div>
    <div class="step"></div>
</div>

{% if error %}
<div class="error">{{ error }}</div>
{% endif %}

<form method="POST" action="/auth/phone">
    <input type="hidden" name="oauth_state" value="{{ oauth_state }}">

    <div class="form-group">
        <label for="phone">Phone Number</label>
        <input type="tel" id="phone" name="phone" placeholder="+1 234 567 8900" required autofocus>
        <p class="hint">Include your country code (e.g., +1 for US)</p>
    </div>

    <button type="submit">Send Verification Code</button>
</form>
{% endblock %}
